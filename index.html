<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vikas | Data Analytics Portfolio</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
}

header {
    padding: 20px 40px;
    background: #020617;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

h1 { margin: 0; font-size: 22px; }

.container {
    padding: 30px 40px;
}

.filters {
    margin-bottom: 20px;
}

input, select {
    padding: 10px;
    margin-right: 10px;
    border-radius: 6px;
    border: none;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    background: #334155;
}

.card img {
    width: 100%;
    border-radius: 6px;
}

button {
    margin-top: 10px;
    padding: 10px;
    border: none;
    background: #2563eb;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

/* Modal */
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    overflow-y: auto;
}

.modal-content {
    background: #0f172a;
    margin: 50px auto;
    padding: 30px;
    width: 80%;
    border-radius: 10px;
}

.close {
    float: right;
    cursor: pointer;
    font-size: 20px;
}
</style>
</head>

<body>

<header>
    <h1>📊 Vikas | Analytics Portfolio</h1>
    <div>
        <a href="#" style="color:white;">LinkedIn</a>
    </div>
</header>

<div class="container">

    <!-- Filters -->
    <div class="filters">
        <input type="text" id="search" placeholder="Search projects...">
        <select id="domainFilter">
            <option value="">All Domains</option>
            <option value="Sales">Sales</option>
            <option value="Finance">Finance</option>
        </select>
    </div>

    <!-- Grid -->
    <div class="grid" id="projectGrid"></div>

</div>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-content" id="modalContent">
        <span class="close" onclick="closeModal()">✖</span>
        <div id="projectDetails"></div>
    </div>
</div>

<script>

const projects = [
{
    title: "Sales Performance Dashboard",
    domain: "Sales",
    tools: "Power BI, SQL",
    image: "https://via.placeholder.com/400x200",
    short: "Analyzed sales trends to identify revenue leakage and growth opportunities.",
    details: `
    <h2>Sales Performance Dashboard</h2>

    <h3>Business Problem</h3>
    <p>Sales leadership lacked visibility into declining revenue trends across regions.</p>

    <h3>Objective</h3>
    <p>Enable real-time tracking of sales KPIs and identify underperforming segments.</p>

    <h3>Dataset</h3>
    <p>Transactional sales data (2M+ rows) from ERP system.</p>

    <h3>Data Transformation</h3>
    <p>Handled missing values, created date hierarchy, normalized product categories.</p>

    <h3>Data Model</h3>
    <p>Star schema with fact_sales and dimension tables.</p>

    <h3>DAX</h3>
    <p>Total Revenue, YoY Growth %, Profit Margin.</p>

    <h3>Insights</h3>
    <ul>
        <li>15% revenue drop in South region</li>
        <li>Top 10 products contribute 60% revenue</li>
    </ul>

    <h3>Impact</h3>
    <p>Helped leadership optimize pricing strategy and improve revenue by 8%.</p>
    `
},
{
    title: "Financial KPI Dashboard",
    domain: "Finance",
    tools: "Power BI, Excel",
    image: "https://via.placeholder.com/400x200",
    short: "Tracked financial health and cost optimization metrics.",
    details: "<h2>Finance Project Details Coming Soon</h2>"
}
];

function renderProjects() {
    const grid = document.getElementById("projectGrid");
    const search = document.getElementById("search").value.toLowerCase();
    const domain = document.getElementById("domainFilter").value;

    grid.innerHTML = "";

    projects
    .filter(p => 
        p.title.toLowerCase().includes(search) &&
        (domain === "" || p.domain === domain)
    )
    .forEach(p => {
        grid.innerHTML += `
        <div class="card">
            <img src="${p.image}">
            <h3>${p.title}</h3>
            <p>${p.short}</p>
            <small>${p.tools}</small><br>
            <button onclick="openModal('${p.title}')">View Project</button>
        </div>
        `;
    });
}

function openModal(title) {
    const project = projects.find(p => p.title === title);
    document.getElementById("projectDetails").innerHTML = project.details;
    document.getElementById("modal").style.display = "block";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

document.getElementById("search").addEventListener("input", renderProjects);
document.getElementById("domainFilter").addEventListener("change", renderProjects);

renderProjects();

</script>

</body>
</html>
