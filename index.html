<!DOCTYPE html>
<html>
<head>
  <title>My Power BI Portfolio</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background-color: #f5f5f5;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
    }

    .modal-content {
      position: relative;
      margin: 5% auto;
      width: 80%;
      height: 80%;
      background: white;
      padding: 10px;
    }

    iframe {
      width: 100%;
      height: 90%;
      border: none;
    }

    .close {
      position: absolute;
      top: 10px;
      right: 20px;
      font-size: 25px;
      cursor: pointer;
    }
  </style>

</head>

<body>

<div class="container">
  <h1>Welcome to My Power BI Portfolio</h1>
  <p>Hi, I'm Vikas. I build data-driven dashboards using Power BI.</p>

  <!-- Project Card -->
  <div class="card" onclick="openModal()">
    <h3>Supplier Performance Dashboard</h3>
    <p>Click to view interactive report</p>
  </div>
</div>

<!-- Modal -->
<div id="reportModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>

<iframe title="Healthcare_Analytics_Data" width="1140" height="541.25" 
  src="https://app.powerbi.com/reportEmbed?reportId=28de41d8-d51a-40f9-b0d8-ea6b23d65219&autoAuth=true&ctid=0ae51e19-07c8-4e4b-bb6d-648ee58410f4" 
  frameborder="0" allowFullScreen="true">
</iframe>
  </div>
</div>

<script>
function openModal() {
  document.getElementById("reportModal").style.display = "block";
}

function closeModal() {
  document.getElementById("reportModal").style.display = "none";
}
</script>

</body>
</html>
