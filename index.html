<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vikas Kumar Paswan | Projects</title>

<style>

/* GLOBAL */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: #e2e8f0;
}

/* HEADER */
header {
    padding: 20px 40px;
    background: rgba(2, 6, 23, 0.7);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

h1 { margin: 0; font-size: 20px; }

/* CONTAINER */
.container {
    padding: 30px 40px;
}

/* FILTERS */
.filters {
    margin-bottom: 25px;
}

input, select {
    padding: 10px;
    border-radius: 10px;
    border: none;
    margin-right: 10px;
    background: rgba(30, 41, 59, 0.6);
    color: white;
    backdrop-filter: blur(8px);
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 24px;
}

@media (max-width: 1024px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
}

/* CARD (GLASS EFFECT) */
.card {
    background: rgba(30, 41, 59, 0.6);
    backdrop-filter: blur(12px);
    border-radius: 18px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border: 1px solid rgba(255,255,255,0.05);
    transition: all 0.4s ease;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
}

/* IMAGE */
.card img {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    transition: 0.4s;
}

.card:hover img {
    transform: scale(1.05);
}

/* BODY */
.card-body {
    padding: 16px;
    flex-grow: 1;
}

.card-body h3 {
    margin: 0 0 8px;
    font-size: 18px;
}

.card-body p {
    font-size: 14px;
    color: #94a3b8;
}

.card-body small {
    color: #38bdf8;
    font-size: 12px;
}

/* FOOTER */
.card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px 18px;
    gap: 10px;
}

/* BUTTON BASE */
.btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 500;
    border-radius: 999px;
    text-decoration: none;
    transition: all 0.3s ease;
    cursor: pointer;
    white-space: nowrap;
}

/* DASHBOARD BUTTON */
.btn-primary {
    background: linear-gradient(135deg, #4facfe, #00c6ff);
    color: white;
    box-shadow: 0 4px 15px rgba(0, 198, 255, 0.35);
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(0, 198, 255, 0.6);
}

/* PBIX BUTTON */
.btn-secondary {
    background: linear-gradient(135deg, #ff7e5f, #ff512f);
    color: white;
    box-shadow: 0 4px 15px rgba(255, 94, 0, 0.35);
}

.btn-secondary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(255, 94, 0, 0.6);
}

/* MORE DETAILS BUTTON */
.btn-outline {
    background: transparent;
    color: #38bdf8;
    border: 2px solid rgba(56, 189, 248, 0.6);
}

.btn-outline:hover {
    background: rgba(56, 189, 248, 0.1);
    transform: translateY(-1px);
}

/* RIGHT BUTTON GROUP */
.right-buttons {
    display: flex;
    gap: 8px;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
}

.modal-content {
    background: #111c2d;
    margin: 100px auto;
    padding: 30px;
    width: 80%;
    border-radius: 14px;
}

.close {
    float: right;
    cursor: pointer;
    font-size: 20px;
}

</style>
</head>

<body>

<header>
    <h1>Vikas Kumar Paswan | Projects</h1>
    <a href="https://www.linkedin.com/in/vikaskumar1802/" style="color:#38bdf8;">LinkedIn</a>

<div class="container">

<div class="filters">
    <input type="text" id="search" placeholder="Search projects...">
    <select id="domainFilter">
        <option value="">All Domains</option>
        <option value="Sales">Sales</option>
        <option value="Finance">Finance</option>

<div class="grid" id="projectGrid"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">✖</span>
<div id="projectDetails"></div>
</div>
</div>

function renderProjects() {
    const grid = document.getElementById("projectGrid");
    const search = document.getElementById("search").value.toLowerCase();
    const domain = document.getElementById("domainFilter").value;

    grid.innerHTML = "";

    projects
    .filter(p =>
        p.title.toLowerCase().includes(search) &&
        (domain === "" || p.domain === domain)
    )
    .forEach(p => {
        grid.innerHTML += `
        <div class="card">
            <img src="${p.image}">
            
            <div class="card-body">
                <h3>${p.title}</h3>
                <p>${p.short}</p>
                <small>${p.tools}</small>
            </div>

            <div class="card-footer">

                <button class="btn btn-outline" onclick="openModal('${p.title}')">
                    More Details
                </button>

                <div class="right-buttons">
                    <a href="${p.live}" target="_blank" class="btn btn-primary">
                        Dashboard
                    </a>
                    <a href="${p.download}" download class="btn btn-secondary">
                        PBIX File
                    </a>
                </div>

            </div>
        </div>
        `;
    });
}

function openModal(title) {
    const project = projects.find(p => p.title === title);
    document.getElementById("projectDetails").innerHTML = project.details;
    document.getElementById("modal").style.display = "block";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

document.getElementById("search").addEventListener("input", renderProjects);
document.getElementById("domainFilter").addEventListener("change", renderProjects);

renderProjects();

</script>

</body>
</html>
