<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vikas Kumar Paswan | Projects</title>

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
}

/* HEADER */
header {
    padding: 20px 40px;
    background: #020617;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 1000;
    border-bottom: 1px solid #1e293b;
}

h1 { margin: 0; font-size: 20px; }

/* CONTAINER */
.container {
    padding: 30px 40px;
}

/* FILTERS */
.filters {
    margin-bottom: 25px;
}

input, select {
    padding: 10px;
    border-radius: 8px;
    border: none;
    margin-right: 10px;
    background: #1e293b;
    color: white;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 24px;
}

@media (max-width: 1024px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
}

/* CARD */
.card {
    background: #1e293b;
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: all 0.3s ease;
    border: 1px solid #334155;
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}

/* IMAGE */
.card img {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    transition: 0.4s;
}

.card:hover img {
    transform: scale(1.05);
}

/* BODY */
.card-body {
    padding: 16px;
    flex-grow: 1;
}

.card-body h3 {
    margin: 0 0 8px;
    font-size: 18px;
}

.card-body p {
    font-size: 14px;
    color: #94a3b8;
}

.card-body small {
    color: #38bdf8;
    font-size: 12px;
}

/* FOOTER */
.card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px 16px;
}

/* PRIMARY BUTTON */
button {
    padding: 8px 14px;
    border: none;
    background: #2563eb;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #3b82f6;
}

/* ACTION BUTTONS */
.right-buttons {
    display: flex;
    gap: 8px;
}

.action-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 10px;
    font-size: 12px;
    background: #1e40af;
    color: white;
    border-radius: 8px;
    text-decoration: none;
    transition: 0.3s;
}

.action-btn:hover {
    background: #2563eb;
}

.action-btn.secondary {
    background: #334155;
}

.action-btn.secondary:hover {
    background: #475569;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    overflow-y: auto;
}

.modal-content {
    background: #020617;
    margin: 50px auto;
    padding: 30px;
    width: 80%;
    border-radius: 12px;
}

.close {
    float: right;
    cursor: pointer;
    font-size: 20px;
}
</style>
</head>

<body>

<header>
    <h1>Vikas Kumar Paswan | Projects</h1>
    <a href="https://www.linkedin.com/in/vikaskumar1802/" style="color:#38bdf8;">LinkedIn</a>
</header>

<div class="container">

<div class="filters">
    <input type="text" id="search" placeholder="Search projects...">
    <select id="domainFilter">
        <option value="">All Domains</option>
        <option value="Sales">Sales</option>
        <option value="Finance">Finance</option>
    </select>
</div>

<div class="grid" id="projectGrid"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">✖</span>
<div id="projectDetails"></div>
</div>
</div>

function renderProjects() {
    const grid = document.getElementById("projectGrid");
    const search = document.getElementById("search").value.toLowerCase();
    const domain = document.getElementById("domainFilter").value;

    grid.innerHTML = "";

    projects
    .filter(p =>
        p.title.toLowerCase().includes(search) &&
        (domain === "" || p.domain === domain)
    )
    .forEach(p => {
        grid.innerHTML += `
        <div class="card">
            <img src="${p.image}">
            
            <div class="card-body">
                <h3>${p.title}</h3>
                <p>${p.short}</p>
                <small>${p.tools}</small>
            </div>

            <div class="card-footer">
                <button onclick="openModal('${p.title}')">View Details</button>

                <div class="right-buttons">
                    <a href="${p.live}" target="_blank" class="action-btn">View Dashboard</a>
                    <a href="${p.download}" download class="action-btn secondary">Download .PBIX file</a>
                </div>
            </div>
        </div>
        `;
    });
}

function openModal(title) {
    const project = projects.find(p => p.title === title);
    document.getElementById("projectDetails").innerHTML = project.details;
    document.getElementById("modal").style.display = "block";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

document.getElementById("search").addEventListener("input", renderProjects);
document.getElementById("domainFilter").addEventListener("change", renderProjects);

renderProjects();

</script>

</body>
</html>
